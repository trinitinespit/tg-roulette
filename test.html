<!DOCTYPE html>
<html>
<head>
  <title>Video Roulette</title>
  <style>
    video {
      width: 300px;
      background: black;
      margin: 5px;
    }
  </style>
</head>
<body>

<h2>Video Roulette</h2>

<button onclick="startCamera()">Enable camera</button>
<button id="findBtn" onclick="find()" disabled>Find partner</button>
<button onclick="next()">Next</button>

<p id="status">Camera not started</p>

<video id="local" autoplay muted playsinline
  style="transform: scaleX(-1);"></video>
<video id="remote" autoplay playsinline></video>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let room = null;
let pc = null;
let stream = null;

let searching = false;
let streamReady = false;

// 🎥 КАМЕРА ПО КНОПКЕ
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: true
    });

    document.getElementById("local").srcObject = stream;

    streamReady = true;
    document.getElementById("status").innerText = "Camera ready";

    document.getElementById("findBtn").disabled = false;

  } catch (err) {
    console.log(err);
    document.getElementById("status").innerText = "Camera blocked / denied";
  }
}

// 🔧 PEER
function createPeer() {
  pc = new RTCPeerConnection({
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
  });

  stream.getTracks().forEach(track => {
    pc.addTrack(track, stream);
  });

  pc.ontrack = (e) => {
    document.getElementById("remote").srcObject = e.streams[0];
  };

  pc.onicecandidate = (e) => {
    if (e.candidate && room) {
      socket.emit("signal", { room, data: e.candidate });
    }
  };
}

// 🎯 MATCH
socket.on("matched", async (data) => {
  room = data.room;
  searching = false;

  document.getElementById("status").innerText = "MATCHED";

  createPeer();

  if (data.initiator) {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    socket.emit("signal", { room, data: offer });
  }
});

// 📡 SIGNAL
socket.on("signal", async (data) => {
  if (!pc) return;

  if (data.type === "offer") {
    await pc.setRemoteDescription(data);

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    socket.emit("signal", { room, data: answer });

  } else if (data.type === "answer") {
    await pc.setRemoteDescription(data);

  } else {
    try {
      await pc.addIceCandidate(data);
    } catch {}
  }
});

// 🚀 FIND
function find() {
  if (!streamReady) {
    document.getElementById("status").innerText = "Enable camera first";
    return;
  }

  if (searching) return;
  searching = true;

  cleanup();

  socket.emit("find");
  document.getElementById("status").innerText = "Searching...";
}

// ⏭ NEXT
function next() {
  cleanup();
  socket.emit("find");
}

// 🧹 CLEANUP
function cleanup() {
  room = null;

  if (pc) {
    pc.close();
    pc = null;
  }

  document.getElementById("remote").srcObject = null;
  document.getElementById("status").innerText = "Idle";
}
</script>

</body>
</html>
