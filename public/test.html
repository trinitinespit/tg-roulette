<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Video Roulette</title>

  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    .wrap {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    video {
      width: 45vw;
      max-width: 500px;
      aspect-ratio: 16/9;
      background: black;
      border-radius: 10px;
      object-fit: cover;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    #status {
      margin-top: 10px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<h2>Video Roulette</h2>

<button id="start">Start camera</button>
<button id="next">Next</button>

<div id="status">Idle...</div>

<div class="wrap">
  <video id="local" autoplay playsinline muted></video>
  <video id="remote" autoplay playsinline></video>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let localStream;
let pc;
let room;

const status = document.getElementById("status");

const config = {
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

const localVideo = document.getElementById("local");
const remoteVideo = document.getElementById("remote");

document.getElementById("start").onclick = async () => {
  localStream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  localVideo.srcObject = localStream;

  status.innerText = "Waiting for partner...";
};

document.getElementById("next").onclick = () => {
  if (pc) pc.close();
  pc = null;
  remoteVideo.srcObject = null;

  socket.emit("next");
  status.innerText = "Searching...";
};

function createPeer(initiator) {
  pc = new RTCPeerConnection(config);

  localStream.getTracks().forEach(track => {
    pc.addTrack(track, localStream);
  });

  pc.ontrack = (e) => {
    remoteVideo.srcObject = e.streams[0];
  };

  pc.onicecandidate = (e) => {
    if (e.candidate) {
      socket.emit("signal", {
        room,
        data: { candidate: e.candidate }
      });
    }
  };

  if (initiator) {
    pc.createOffer()
      .then(o => pc.setLocalDescription(o))
      .then(() => {
        socket.emit("signal", {
          room,
          data: { offer: pc.localDescription }
        });
      });
  }
}

socket.on("matched", (data) => {
  room = data.room;
  status.innerText = "Connected";
  createPeer(data.initiator);
});

socket.on("signal", async (data) => {
  if (!pc) return;

  if (data.offer) {
    await pc.setRemoteDescription(data.offer);
    const ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);

    socket.emit("signal", {
      room,
      data: { answer: pc.localDescription }
    });
  }

  if (data.answer) {
    await pc.setRemoteDescription(data.answer);
  }

  if (data.candidate) {
    try {
      await pc.addIceCandidate(data.candidate);
    } catch (e) {}
  }
});

socket.on("partner_disconnected", () => {
  if (pc) pc.close();
  pc = null;
  remoteVideo.srcObject = null;

  status.innerText = "Partner left. Searching...";
});
</script>

</body>
</html>
