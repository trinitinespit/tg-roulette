<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Video Roulette</title>
  <style>
    body { font-family: sans-serif; text-align: center; background: #111; color: white; }
    video { width: 45%; margin: 10px; background: black; }
    button { padding: 10px 20px; margin: 10px; }
  </style>
</head>
<body>

<h2>Video Roulette</h2>

<button id="start">Start camera</button>
<button id="find">Find partner</button>

<div>
  <video id="local" autoplay playsinline muted></video>
  <video id="remote" autoplay playsinline></video>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let localStream;
let pc;
let room;

const config = {
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

const localVideo = document.getElementById("local");
const remoteVideo = document.getElementById("remote");

document.getElementById("start").onclick = async () => {
  localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  localVideo.srcObject = localStream;
};

document.getElementById("find").onclick = () => {
  socket.emit("find");
};

function createPeer(initiator) {
  pc = new RTCPeerConnection(config);

  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  pc.ontrack = (event) => {
    remoteVideo.srcObject = event.streams[0];
  };

  pc.onicecandidate = (event) => {
    if (event.candidate) {
      socket.emit("signal", { room, data: { candidate: event.candidate } });
    }
  };

  if (initiator) {
    pc.createOffer().then(offer => {
      pc.setLocalDescription(offer);
      socket.emit("signal", { room, data: { offer } });
    });
  }
}

socket.on("matched", (data) => {
  room = data.room;
  createPeer(data.initiator);
});

socket.on("signal", async (data) => {
  if (data.offer) {
    await pc.setRemoteDescription(data.offer);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    socket.emit("signal", { room, data: { answer } });
  }

  if (data.answer) {
    await pc.setRemoteDescription(data.answer);
  }

  if (data.candidate) {
    try {
      await pc.addIceCandidate(data.candidate);
    } catch (e) {}
  }
});
</script>

</body>
</html>
