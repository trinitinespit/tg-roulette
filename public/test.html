<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Video Roulette</title>

<style>
body {
  background:#111;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

.wrap {
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
  flex-wrap:wrap;
}

video {
  width:45vw;
  max-width:500px;
  aspect-ratio:16/9;
  background:black;
  border-radius:10px;
  object-fit:cover;
  transition: all 0.3s ease;
}

/* 🔥 LOCAL MIRROR (как у человека) */
#local {
  transform: scaleX(-1);
}

/* 🔥 SEARCH EFFECT */
.searching {
  filter: blur(6px) brightness(0.6);
  transform: scale(1.02);
}

/* 🔥 OVERLAY */
.overlay {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:20px;
  background:rgba(0,0,0,0.5);
}

.remote-wrapper {
  position:relative;
  display:inline-block;
}

.hidden {
  display:none;
}

button {
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>Video Roulette</h2>

<button id="start">Start</button>
<button id="find">Find</button>
<button id="next">Next</button>

<div class="wrap">

  <div>
    <video id="local" autoplay playsinline muted></video>
  </div>

  <div class="remote-wrapper">
    <video id="remote" autoplay playsinline></video>

    <div id="overlay" class="overlay">
      Searching for partner...
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let stream;
let pc;
let room;

const local = document.getElementById("local");
const remote = document.getElementById("remote");
const overlay = document.getElementById("overlay");

function setSearchingUI(isSearching) {
  if (isSearching) {
    remote.classList.add("searching");
    overlay.classList.remove("hidden");
  } else {
    remote.classList.remove("searching");
    overlay.classList.add("hidden");
  }
}

document.getElementById("start").onclick = async () => {
  stream = await navigator.mediaDevices.getUserMedia({
    video:true,
    audio:true
  });

  local.srcObject = stream;
};

document.getElementById("find").onclick = () => {
  setSearchingUI(true);
  socket.emit("find");
};

document.getElementById("next").onclick = () => {
  if (pc) pc.close();
  pc = null;
  remote.srcObject = null;

  setSearchingUI(true);
  socket.emit("next");
};

function createPeer(initiator) {
  pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  stream.getTracks().forEach(t => pc.addTrack(t, stream));

  pc.ontrack = e => {
    remote.srcObject = e.streams[0];
    setSearchingUI(false);
  };

  pc.onicecandidate = e => {
    if (e.candidate) {
      socket.emit("signal", {
        room,
        data:{candidate:e.candidate}
      });
    }
  };

  if (initiator) {
    pc.createOffer()
      .then(o => pc.setLocalDescription(o))
      .then(() => {
        socket.emit("signal", {
          room,
          data:{offer:pc.localDescription}
        });
      });
  }
}

socket.on("matched", data => {
  room = data.room;
  createPeer(data.initiator);
});

socket.on("partner_disconnected", () => {
  if (pc) pc.close();
  pc = null;
  remote.srcObject = null;
  setSearchingUI(true);
});

socket.on("signal", async data => {
  if (!pc) return;

  if (data.offer) {
    await pc.setRemoteDescription(data.offer);
    const ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);

    socket.emit("signal", {
      room,
      data:{answer:pc.localDescription}
    });
  }

  if (data.answer) {
    await pc.setRemoteDescription(data.answer);
  }

  if (data.candidate) {
    try { await pc.addIceCandidate(data.candidate); } catch {}
  }
});
</script>

</body>
</html>
