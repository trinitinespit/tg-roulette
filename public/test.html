<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Video Roulette</title>

<style>
body {
  background:#111;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

.wrap {
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
  flex-wrap:wrap;
}

video {
  width:45vw;
  max-width:500px;
  aspect-ratio:16/9;
  background:black;
  border-radius:10px;
  object-fit:cover;
}

/* локальная камера зеркальная */
#local {
  transform: scaleX(-1);
}

/* SEARCH BLUR */
.searching {
  filter: blur(6px) brightness(0.6);
}

/* OVERLAY */
.remote-wrapper {
  position:relative;
  display:inline-block;
}

.overlay {
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
  font-size:18px;
  font-weight:600;
}

.hidden {
  display:none;
}

/* анимация точек */
@keyframes dots {
  0% { content: "."; }
  33% { content: ".."; }
  66% { content: "..."; }
}

.dots::after {
  content: ".";
  animation: dots 1s infinite;
}

button {
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>Video Roulette</h2>

<button id="start">Start</button>
<button id="find">Find</button>
<button id="next">Next</button>

<div class="wrap">

  <video id="local" autoplay playsinline muted></video>

  <div class="remote-wrapper">
    <video id="remote" autoplay playsinline></video>

    <div id="overlay" class="overlay hidden">
      Searching<span class="dots"></span>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let stream;
let pc;
let room;

const local = document.getElementById("local");
const remote = document.getElementById("remote");
const overlay = document.getElementById("overlay");

function setSearching(state) {
  if (state) {
    overlay.classList.remove("hidden");
    remote.classList.add("searching");
  } else {
    overlay.classList.add("hidden");
    remote.classList.remove("searching");
  }
}

document.getElementById("start").onclick = async () => {
  stream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  local.srcObject = stream;
};

document.getElementById("find").onclick = () => {
  setSearching(true);
  socket.emit("find");
};

document.getElementById("next").onclick = () => {
  if (pc) pc.close();
  pc = null;
  remote.srcObject = null;

  setSearching(true);
  socket.emit("next");
};

function createPeer(initiator) {
  pc = new RTCPeerConnection({
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
  });

  stream.getTracks().forEach(t => pc.addTrack(t, stream));

  pc.ontrack = e => {
    remote.srcObject = e.streams[0];
    setSearching(false);
  };

  pc.onicecandidate = e => {
    if (e.candidate) {
      socket.emit("signal", {
        room,
        data: { candidate: e.candidate }
      });
    }
  };

  if (initiator) {
    pc.createOffer()
      .then(o => pc.setLocalDescription(o))
      .then(() => {
        socket.emit("signal", {
          room,
          data: { offer: pc.localDescription }
        });
      });
  }
}

socket.on("matched", data => {
  room = data.room;
  createPeer(data.initiator);
});

socket.on("signal", async data => {
  if (!pc) return;

  if (data.offer) {
    await pc.setRemoteDescription(data.offer);
    const ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);

    socket.emit("signal", {
      room,
      data: { answer: pc.localDescription }
    });
  }

  if (data.answer) {
    await pc.setRemoteDescription(data.answer);
  }

  if (data.candidate) {
    try { await pc.addIceCandidate(data.candidate); } catch {}
  }
});

socket.on("partner_left", () => {
  if (pc) pc.close();
  pc = null;
  remote.srcObject = null;
  setSearching(true);
});
</script>

</body>
</html>
