<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Video Roulette</title>

<style>
body { background:#111; color:white; text-align:center; font-family:sans-serif; }
video { width:45vw; max-width:500px; border-radius:10px; background:black; }
.wrap { display:flex; justify-content:center; gap:20px; margin-top:20px; }
button { margin:5px; padding:10px; }
</style>
</head>

<body>

<h2>Video Roulette</h2>

<button id="start">Start</button>
<button id="find">Find</button>
<button id="next">Next</button>

<div class="wrap">
  <video id="local" autoplay playsinline muted></video>
  <video id="remote" autoplay playsinline></video>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let stream;
let pc;
let room;

const local = document.getElementById("local");
const remote = document.getElementById("remote");

document.getElementById("start").onclick = async () => {
  stream = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
  local.srcObject = stream;
};

document.getElementById("find").onclick = () => {
  socket.emit("find");
};

document.getElementById("next").onclick = () => {
  if (pc) pc.close();
  pc = null;
  remote.srcObject = null;

  socket.emit("next");
};

function create(initiator) {
  pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  stream.getTracks().forEach(t => pc.addTrack(t, stream));

  pc.ontrack = e => remote.srcObject = e.streams[0];

  pc.onicecandidate = e => {
    if (e.candidate) {
      socket.emit("signal", { room, data:{ candidate:e.candidate }});
    }
  };

  if (initiator) {
    pc.createOffer()
      .then(o => pc.setLocalDescription(o))
      .then(() => {
        socket.emit("signal", { room, data:{ offer:pc.localDescription }});
      });
  }
}

socket.on("matched", data => {
  room = data.room;
  create(data.initiator);
});

socket.on("signal", async data => {
  if (!pc) return;

  if (data.offer) {
    await pc.setRemoteDescription(data.offer);
    const ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);

    socket.emit("signal", { room, data:{ answer:pc.localDescription }});
  }

  if (data.answer) {
    await pc.setRemoteDescription(data.answer);
  }

  if (data.candidate) {
    try { await pc.addIceCandidate(data.candidate); } catch {}
  }
});

socket.on("partner_disconnected", () => {
  if (pc) pc.close();
  pc = null;
  remote.srcObject = null;
});
</script>

</body>
</html>
